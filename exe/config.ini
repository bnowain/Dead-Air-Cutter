# Dead Air Cutter — configuration file
# Place this file in the same folder as cut_dead_air.exe
# Command-line arguments always override these settings.
# Lines starting with # are comments.

[settings]

# ── ffmpeg paths ──────────────────────────────────────────────────────────────
# Leave blank to use ffmpeg from your system PATH (recommended).
# Set a full path if you have ffmpeg installed somewhere specific, e.g.:
#   ffmpeg_bin = C:\ffmpeg\bin\ffmpeg.exe
#   ffprobe_bin = C:\ffmpeg\bin\ffprobe.exe
ffmpeg_bin =
ffprobe_bin =

# ── GPU acceleration ──────────────────────────────────────────────────────────
# Use NVIDIA CUDA for encoding and freeze detection (much faster on supported hardware).
# Set to true to DISABLE GPU and use CPU only (e.g. on a machine without NVIDIA GPU).
no_gpu = false

# ── Detection mode ────────────────────────────────────────────────────────────
# audio_only = true   →  cut on silence alone (skips freeze detection)
# audio_only = false  →  only cut regions that are BOTH silent AND frozen (safer)
audio_only = false

# ── Silence detection ─────────────────────────────────────────────────────────
# noise_db: audio level below which a region counts as "silent" (in dB).
#   -50  works well for rooms with HVAC hum or light background noise.
#   -35  use if your recording has noticeable ambient sound during breaks.
#   -91  use only for recordings with truly zero background noise.
noise_db = -50

# min_silence: a silent (and frozen) region must last at least this many seconds
# before it gets cut.  30s avoids cutting brief pauses between speakers.
# Raise to 60 or 120 if you only want to cut long closed-session breaks.
min_silence = 30

# ── Freeze detection ──────────────────────────────────────────────────────────
# freeze_noise: maximum mean-squared error between frames to still consider the
# video "frozen".  Lower = stricter (pixel-perfect identical frames required).
#   0.003  default — tight, works for most screen-capture / OBS recordings
#   0.01   use if your camera has sensor noise that slightly varies each frame
#   0.05   very loose — catches slow-moving scenes (not recommended)
freeze_noise = 0.003
